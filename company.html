<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taiwan AI Supply Chain Hub - Company</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body data-page="company">
    <main class="page">
        <header class="topbar">
            <p class="brand">Taiwan AI Supply Chain Hub</p>
            <nav class="mini-nav" aria-label="快速導覽">
                <a href="./index.html">首頁</a>
                <a href="./companies.html">公司列表</a>
            </nav>
        </header>

        <section class="detail-hero">
            <div>
                <p class="section-kicker">Company</p>
                <h1 id="company-title">載入中...</h1>
                <p class="lead" id="company-intro">公司定位與供應鏈脈絡整理中。</p>
            </div>
            <aside class="hero-panel">
                <p class="panel-label">快速資訊</p>
                <ul class="signal-list" id="company-facts" data-load-error>
                    <li>載入中...</li>
                </ul>
            </aside>
        </section>

        <section class="detail-grid">
            <article class="detail-card">
                <h2>現在追這家公司要看什麼</h2>
                <ul class="signal-list" id="company-watch-items" data-load-error>
                    <li>載入中...</li>
                </ul>
            </article>

            <article class="detail-card">
                <h2>它在供應鏈的連動位置</h2>
                <ul class="signal-list" id="company-links" data-load-error>
                    <li>載入中...</li>
                </ul>
            </article>
        </section>

        <section class="section">
            <div class="section-head">
                <p class="section-kicker">Market Angles</p>
                <h2>近期市場通常怎麼看它</h2>
                <p>先整理市場最常提到的觀察角度，快速掌握這家公司目前被關注的原因。</p>
            </div>
            <div class="news-grid" id="company-angles" data-load-error>
                <article class="news-card">
                    <p>載入中...</p>
                </article>
            </div>
        </section>

        <section class="section">
            <div class="section-head">
                <p class="section-kicker">Related News</p>
                <h2>相關新聞</h2>
                <p>聚合和這家公司直接相關的供應鏈新聞，方便從事件回頭理解公司位置。</p>
            </div>
            <div class="news-grid" id="company-news" data-load-error>
                <article class="news-card">
                    <p>載入中...</p>
                </article>
            </div>
        </section>
    </main>

    <script src="./app.js"></script>
</body>
</html>
